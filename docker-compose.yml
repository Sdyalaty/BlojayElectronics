services:
  blojayelectronics:
    build: .
    container_name: blojay_app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/BlojayElectronics.db
    volumes:
      - sqldata:/app/data
    restart: unless-stopped

volumes:
  sqldata: